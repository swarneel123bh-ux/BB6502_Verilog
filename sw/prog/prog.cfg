MEMORY {
    ZP:     start = $0030, size = $0020, type = rw, define = yes;
    HEADER: start = $1000, size = $0006, type = ro, fill = yes;
    PROG:   start = $1006, size = $6EFA, type = rw, fill = no;
}

SEGMENTS {
    ZEROPAGE: load = ZP,     type = zp;
    HDR:      load = HEADER, type = ro;
    CODE:     load = PROG,   type = ro;
    RODATA:   load = PROG,   type = ro;
    DATA:     load = PROG,   type = rw;
    BSS:      load = PROG,   type = bss, define = yes;
}
