MEMORY {
    ZP:     start = $0000, size = $0020, type = rw, define = yes;
    HEADER: start = $0200, size = $0006, type = rw, fill = yes;
    KCODE:  start = $0206, size = $0DFA, type = rw, fill = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,     type = zp;
    HDR:      load = HEADER, type = ro;
    STARTUP:  load = KCODE,  type = ro;
    CODE:     load = KCODE,  type = ro;
    RODATA:   load = KCODE,  type = ro;
    DATA:     load = KCODE,  type = rw;
    BSS:      load = KCODE,  type = bss, define = yes;
    VECTORS:  load = KCODE,  type = ro;            # not used; could drop
}
